spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${AUTH_DB_CORE_NAME:auth_server_db}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
    initialization-mode: always
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASS}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          enable_lazy_load_no_trans: true
    show-sql: true
