spring:
  application:
    name: sso_server
  config:
    import:
      - database.yml
      - authorization.yml
      - redis.yml

server:
  port: 8843


logging:
  level:
    root: warn
    org:
      hibernate:
        orm:
          jdbc:
            bind: TRACE
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
      springframework:
        jdbc:
          core:
            JdbcTemplate: DEBUG
            StatementCreatorUtils: TRACE
        security: debug
        data:
          mongodb: debug
        web: debug
    com:
      kiraliza:
        spring: trace
  file:
    name: ./logs/server.log
