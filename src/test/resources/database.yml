spring:
  datasource:
    url: jdbc:h2:mem:${AUTH_DB_CORE_NAME:auth_server_db};INIT=CREATE SCHEMA IF NOT EXISTS ${AUTH_DB_CORE_NAME:auth_server_db};MODE=MYSQL
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
    initialization-mode: always
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASS}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          enable_lazy_load_no_trans: true
    show-sql: true
